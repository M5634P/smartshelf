# CI/CD Pipeline: Automatisches Deployment auf Raspberry Pi via Tailscale VPN
name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy Pi-Code
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_PI_IP }}
          username: admin
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd ~/smartshelf
            git pull origin main
            venv/bin/pip install -r requirements_pi.txt -q
            venv/bin/pip install -q 'numpy<1.25'
            sudo cp smartshelf.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl restart smartshelf
